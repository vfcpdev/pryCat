<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Propinas</title>
    <link rel="stylesheet" href="/Clase3/css/style.css">
</head>
<body>
    <main class="contenedor-calculadora">
        <h1>Calculadora de Propinas</h1>
        
        <div class="grupo-entrada">
            <label for="monto">Monto de la cuenta ($):</label>
            <input type="number" id="monto" placeholder="Digite el valor a pagar" min="0" step="0.01">
        </div>

        <div class="grupo-entrada">
            <label for="propina">Porcentaje de propina (%):</label>
            <input type="number" id="propina" placeholder="Ej. 10" min="0" value="">
        </div>

        <div class="grupo-entrada">
            <label for="personas">Número de personas:</label>
            <input type="number" id="personas" placeholder="Ej. 2" min="1" value="1">
        </div>

        <button id="btn-calcular">Calcular División</button>

        <div class="resultado" id="contenedor-resultado">
            <p>Total a pagar por persona:</p>
            <h1 id="total-persona">$0.00</h1>
        </div>
    </main>

    <script src="/Clase3/js/script.js"></script>
</body>
</html>
